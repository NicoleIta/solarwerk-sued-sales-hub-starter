name: Promptfoo Evals

on:
  workflow_dispatch:
  push:
    paths:
      - "prompts/**"
      - "promptfooconfig.yaml"
  pull_request:
    paths:
      - "prompts/**"
      - "promptfooconfig.yaml"

jobs:
  eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Promptfoo installieren
        run: npm install -g promptfoo

      - name: API Key prüfen
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then echo "SECRET FEHLT"; else echo "Secret gesetzt (${#OPENROUTER_API_KEY} Zeichen)"; fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Evals ausführen
        run: promptfoo eval --no-cache
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
